        const now = new Date();
        const midnight = new Date(now); midnight.setHours(23, 59, 59, 999);
        const diff = Math.floor((midnight - now) / 1000);
        return {
          h: Math.max(0, Math.floor(diff / 3600)),
          m: Math.max(0, Math.floor((diff % 3600) / 60)),
          s: Math.max(0, diff % 60)
        };
      });
      const [copied, setCopied] = useState(false);

      useEffect(() => {
        const t = setInterval(() => setTimeLeft(p => {
          let { h, m, s } = p; s--;
          if (s < 0) { s = 59; m--; }
          if (m < 0) { m = 59; h--; }
          if (h < 0) return { h: 0, m: 0, s: 0 };
          return { h, m, s };

        return () => clearInterval(t);

    // ──── AUTH MODAL ────
    function AuthModal({ isOpen, onClose, onLogin, showToast }) {
      const [mode, setMode] = useState('login');
      const [form, setForm] = useState({ name: '', email: '', pass: '' });
      const [err, setErr] = useState('');

      useEffect(() => { if (!isOpen) { setErr(''); setForm({ name: '', email: '', pass: '' }); } }, [isOpen]);

      if (!isOpen) return null;

      const handleSubmit = (ev) => {
        ev.preventDefault();
        setErr('');
        if (!form.email.includes('@')) { setErr('সঠিক ইমেইল দিন'); return; }
        if (form.pass.length < 4) { setErr('পাসওয়ার্ড কমপক্ষে ৪ অক্ষরের'); return; }
        if (mode === 'register' && !form.name.trim()) { setErr('নাম লিখুন'); return; }

        const users = LS('users', []);
        if (mode === 'register') {
          if (users.find(u => u.email === form.email)) { setErr('এই ইমেইলে আগেই অ্যাকাউন্ট আছে'); return; }
          const newUser = { id: Date.now(), name: form.name, email: form.email, pass: form.pass, avatar: '👤' };
          SS('users', [...users, newUser]);
          onLogin(newUser);
          showToast(`স্বাগতম, ${newUser.name}! 🎉`);
        } else {
          const found = users.find(u => u.email === form.email && u.pass === form.pass);
          if (!found) { setErr('ইমেইল বা পাসওয়ার্ড ভুল'); return; }
          onLogin(found);
          showToast(`স্বাগতম, ${found.name}!`);
        }
        onClose();
      };

      return e('div', { className: 'fixed inset-0 z-[60] flex items-center justify-center p-4' },
        e('div', { className: 'fixed inset-0 bg-black/60 backdrop-blur-sm', onClick: onClose }),
        e('div', { className: 'relative bg-white dark:bg-slate-800 w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-scale-in' },
          e('div', { className: 'bg-gradient-to-r from-rose-500 to-pink-600 px-6 py-5 text-white text-center' },
            e('div', { className: 'text-3xl mb-1' }, '🎂'),
            e('h3', { className: 'font-bold text-lg' }, mode === 'login' ? 'লগইন করুন' : 'নতুন অ্যাকাউন্ট তৈরি'),
            e('p', { className: 'text-xs text-rose-100' }, 'বেক আর্ট স্টাইলে আপনাকে স্বাগতম!')
          ),
          e('button', { onClick: onClose, className: 'absolute top-4 right-4 text-white/80 hover:text-white text-lg transition-colors' }, '✕'),
          e('div', { className: 'p-6' },
            e('form', { onSubmit: handleSubmit, className: 'flex flex-col gap-3' },
              mode === 'register' && e('input', { type: 'text', placeholder: 'আপনার নাম *', value: form.name, onChange: ev => setForm({ ...form, name: ev.target.value }), className: 'w-full p-3 rounded-xl border dark:border-slate-600 focus:border-rose-500 outline-none text-sm bg-white dark:bg-slate-700 dark:text-white transition-colors' }),
              e('input', { type: 'email', placeholder: 'ইমেইল ঠিকানা *', value: form.email, onChange: ev => setForm({ ...form, email: ev.target.value }), className: 'w-full p-3 rounded-xl border dark:border-slate-600 focus:border-rose-500 outline-none text-sm bg-white dark:bg-slate-700 dark:text-white transition-colors' }),
              e('input', { type: 'password', placeholder: 'পাসওয়ার্ড (৪+ অক্ষর) *', value: form.pass, onChange: ev => setForm({ ...form, pass: ev.target.value }), className: 'w-full p-3 rounded-xl border dark:border-slate-600 focus:border-rose-500 outline-none text-sm bg-white dark:bg-slate-700 dark:text-white transition-colors' }),
              err && e('p', { className: 'text-rose-600 text-xs font-medium bg-rose-50 dark:bg-rose-900/30 p-3 rounded-xl' }, '⚠ ' + err),
              e('button', { type: 'submit', className: 'w-full py-3 bg-gradient-to-r from-rose-500 to-pink-600 text-white font-bold rounded-xl shadow-md btn-shine' },
                mode === 'login' ? 'লগইন করুন' : 'অ্যাকাউন্ট তৈরি করুন'
              )
            ),
            e('p', { className: 'text-center text-xs text-gray-500 dark:text-gray-400 mt-4' },
              mode === 'login' ? 'অ্যাকাউন্ট নেই? ' : 'আগেই অ্যাকাউন্ট আছে? ',
              e('button', { onClick: () => { setMode(mode === 'login' ? 'register' : 'login'); setErr(''); }, className: 'text-rose-600 dark:text-rose-400 font-bold hover:underline' },
                mode === 'login' ? 'রেজিস্টার করুন' : 'লগইন করুন'
              )
            )
          )
        )
      );
    }

    // ──── FOOTER ────
    function Footer() {
      return e('footer', { className: 'bg-gradient-to-b from-gray-900 to-rose-950 text-white pt-14 pb-8 border-t-4 border-rose-500' },
        e('div', { className: 'max-w-7xl mx-auto px-4 sm:px-6' },
          e('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-10 pb-10 border-b border-white/10' },
            e('div', null,
              e('div', { className: 'flex items-center gap-3 mb-4' },
                e('span', { className: 'text-2xl' }, '🎂'),
                e('h2', { className: 'text-xl font-bold' }, 'বেক আর্ট স্টাইল')
              ),
              e('p', { className: 'text-xs text-gray-400 leading-relaxed mb-5' }, 'কুমিল্লার হাট বলি বাড়ির হোমমেড বেকারি। ১০০% তাজা ও খাঁটি কেক, ডেলিভারি সার্ভিস।'),
              e('div', { className: 'flex gap-3' },
                e('a', { href: 'https://www.tiktok.com/@bakeartstyel', target: '_blank', rel: 'noopener', className: 'w-8 h-8 rounded-full bg-white/10 hover:bg-rose-500 flex items-center justify-center text-xs font-bold transition-colors' }, 'TT'),
                e('a', { href: 'https://wa.me/8801764411168', target: '_blank', rel: 'noopener', className: 'w-8 h-8 rounded-full bg-white/10 hover:bg-green-500 flex items-center justify-center text-xs font-bold transition-colors' }, 'WA'),
                e('a', { href: 'tel:+8801764411168', className: 'w-8 h-8 rounded-full bg-white/10 hover:bg-rose-500 flex items-center justify-center text-xs font-bold transition-colors' }, '📞')
              )
            ),
            e('div', null,
              e('h3', { className: 'text-xs font-bold uppercase tracking-wider text-rose-400 mb-4' }, 'প্রয়োজনীয় লিংক'),
              e('ul', { className: 'flex flex-col gap-2 text-xs text-gray-300' },
                ['হোম:#hero', 'মেন্যু:#menu', 'কাস্টম কেক:#custom-cake', 'আমাদের কথা:#about', 'রিভিউ:#reviews', 'যোগাযোগ:#contact'].map(l => {
                  const [n, h] = l.split(':');
                  return e('li', { key: n }, e('a', { href: h, className: 'hover:text-rose-400 transition-colors' }, n));
                })
              )
            ),
            e('div', null,
              e('h3', { className: 'text-xs font-bold uppercase tracking-wider text-rose-400 mb-4' }, 'যোগাযোগ'),
              e('ul', { className: 'flex flex-col gap-2 text-xs text-gray-300' },
                e('li', null, '📍 হাট বলি বাড়ি, কুমিল্লা'),
                e('li', null, '📞 +880 1764-411168'),
                e('li', null, '💬 WhatsApp: +880 1764-411168'),
                e('li', null, '⏰ সর্বদা উন্মুক্ত')
              )
            )
          ),
          e('div', { className: 'pt-6 text-center text-xs text-gray-500 flex flex-col sm:flex-row items-center justify-between gap-3' },
            e('p', null, `© ${new Date().getFullYear()} বেক আর্ট স্টাইল (Bake Art Style)। সর্বস্বত্ব সংরক্ষিত।`),
            e('a', { href: 'tel:+8801764411168', className: 'hover:text-white transition-colors' }, 'হাট বলি বাড়ি, কুমিল্লা — +880 1764-411168')
          )
        )
      );
    }

    // ──── MAIN APP ────
    function App() {
      const [products, setProducts] = useState(() => LS('products', DEFAULT_PRODUCTS));
      const [settings, setSettings] = useState(() => LS('settings', DEFAULT_SETTINGS));
      const [user, setUser] = useState(() => LS('currentUser', null));
      const [cart, setCart] = useState(() => LS('cart', []));
      const [wishlist, setWishlist] = useState(() => LS('wishlist', []));
      const [dark, setDark] = useState(() => {
        try { return LS('darkMode', window.matchMedia('(prefers-color-scheme: dark)').matches); }
        catch { return false; }
      });
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [isWishlistOpen, setIsWishlistOpen] = useState(false);
      const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
      const [isAuthOpen, setIsAuthOpen] = useState(false);
      const [quickViewProduct, setQuickViewProduct] = useState(null);
      const [promoCode, setPromoCode] = useState('');
      const [discount, setDiscount] = useState(0);
      const [toasts, setToasts] = useState([]);

      // Sync localStorage
      useEffect(() => { SS('products', products); }, [products]);
      useEffect(() => { SS('settings', settings); }, [settings]);
      useEffect(() => { SS('currentUser', user); }, [user]);
      useEffect(() => { SS('cart', cart); }, [cart]);
      useEffect(() => { SS('wishlist', wishlist); }, [wishlist]);
      useEffect(() => { SS('darkMode', dark); document.documentElement.classList.toggle('dark', dark); }, [dark]);

      useEffect(() => {
        const locked = isCartOpen || isWishlistOpen || isCheckoutOpen || isAuthOpen || !!quickViewProduct;
        document.body.style.overflow = locked ? 'hidden' : '';
        return () => { document.body.style.overflow = ''; };
      }, [isCartOpen, isWishlistOpen, isCheckoutOpen, isAuthOpen, quickViewProduct]);

      useEffect(() => {
        const onKey = (ev) => {
          if (ev.key !== 'Escape') return;
          setIsCartOpen(false);
          setIsWishlistOpen(false);
          setIsAuthOpen(false);
          setQuickViewProduct(null);
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const showToast = useCallback((message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
      }, []);

      const addToCart = useCallback((p) => {
        setCart(prev => {
          const ex = prev.find(i => i.id === p.id);
          if (ex) return prev.map(i => i.id === p.id ? { ...i, quantity: i.quantity + (p.quantity || 1) } : i);
          return [...prev, { ...p, quantity: p.quantity || 1 }];
        });
        showToast(`"${p.name}" কার্টে যোগ হয়েছে! 🛒`);
      }, [showToast]);

      const addCustomCake = useCallback((p) => {
        setCart(prev => [...prev, { ...p, quantity: 1 }]);
        showToast('কাস্টম কেক কার্টে যুক্ত হয়েছে!');
        setIsCartOpen(true);
      }, [showToast]);

      const toggleWishlist = useCallback((id) => {
        setWishlist(prev => {
          const has = prev.includes(id);
          showToast(has ? 'ইচ্ছেতালিকা থেকে সরানো হয়েছে 💔' : 'ইচ্ছেতালিকায় যোগ হয়েছে! ♥');
          return has ? prev.filter(x => x !== id) : [...prev, id];
        });
      }, [showToast]);

      const updateQty = useCallback((id, q) => {
        if (q < 1) {
          setCart(prev => prev.filter(i => i.id !== id));
          showToast('আইটেম কার্ট থেকে সরানো হয়েছে', 'error');
        } else {
          setCart(prev => prev.map(i => i.id === id ? { ...i, quantity: q } : i));
        }
      }, [showToast]);

      const removeItem = useCallback((id) => {
        setCart(prev => prev.filter(i => i.id !== id));
        showToast('আইটেম কার্ট থেকে সরানো হয়েছে', 'error');
      }, [showToast]);

      const clearCart = useCallback(() => {
        setCart([]);
        setDiscount(0);
        setPromoCode('');
      }, []);

      const cartCount = cart.reduce((s, i) => s + i.quantity, 0);
      const bestProducts = products
        .filter(p => p.approved)
        .sort((a, b) => (b.reviews * b.rating) - (a.reviews * a.rating))
        .slice(0, 4);

      return e('div', { className: 'min-h-screen flex flex-col' },
        e(Navbar, { cartCount, onOpenCart: () => setIsCartOpen(true), user, onOpenAuth: () => setIsAuthOpen(true), onLogout: () => { setUser(null); SS('currentUser', null); showToast('সফলভাবে লগআউট হয়েছে 👋'); }, wishlistCount: wishlist.length, onOpenWishlist: () => setIsWishlistOpen(true), dark, setDark }),
        e(Hero, { onAdminTrigger: () => showToast('🔐 অ্যাডমিন প্যানেল — PIN: 1234 (ডেমো)'), bestProducts }),
        e(SpecialOffers, { settings }),
        e(MenuSection, { products, onAddToCart: addToCart, wishlist, toggleWishlist, onQuickView: setQuickViewProduct }),
        e(CustomCake, { onAddCustomCake: addCustomCake }),
        e(AboutSection),
        e(Testimonials),
        e(ContactSection, { showToast }),
        e(Footer),
        e(WhatsAppFloat),
        e(ScrollTop),
        e(CartDrawer, { isOpen: isCartOpen, onClose: () => setIsCartOpen(false), cart, onUpdateQty: updateQty, onRemove: removeItem, onCheckout: () => { setIsCartOpen(false); setIsCheckoutOpen(true); }, promoCode, setPromoCode, discount, onApplyPromo: setDiscount, showToast, settings }),
        e(CheckoutModal, { isOpen: isCheckoutOpen, onClose: () => setIsCheckoutOpen(false), cart, discount, onClearCart: clearCart, showToast, settings }),
        e(QuickViewModal, { product: quickViewProduct, isOpen: !!quickViewProduct, onClose: () => setQuickViewProduct(null), onAddToCart: addToCart, wishlist, toggleWishlist }),
        e(WishlistDrawer, { isOpen: isWishlistOpen, onClose: () => setIsWishlistOpen(false), wishlist, products, onRemove: toggleWishlist, onAddToCart: addToCart }),
        e(AuthModal, { isOpen: isAuthOpen, onClose: () => setIsAuthOpen(false), onLogin: setUser, showToast }),
        e(Toasts, { toasts })
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
